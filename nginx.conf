# Nginx 反向代理配置 — 在容器内高效处理 Gzip 压缩 + 代理缓存
# NOTE: proxy_cache_path 必须在 http 块中定义，如果使用 include 方式加载此文件，
# 需要将 proxy_cache_path 指令移到主配置的 http 块中

proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60s;

server {
    listen 3000;
    server_name _;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # 静态资源 — 长期不可变缓存（Next.js 构建哈希保证文件名唯一）
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # NOTE: 1 年缓存 + immutable，浏览器不会发送条件请求
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API 响应 — 短期代理缓存
    # 多个客户端同时请求相同 API 时，Nginx 只向 Node.js 发一次请求
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 启用代理缓存
        proxy_cache api_cache;
        # NOTE: 缓存 POST 请求（batchFetch 使用 POST 方法）
        proxy_cache_methods GET POST;
        # 使用请求 URI + body 作为缓存 key（区分不同 POST 请求）
        proxy_cache_key "$request_uri|$request_body";
        # 缓存有效期 10 秒（与服务端缓存时长一致）
        proxy_cache_valid 200 10s;
        # 404 响应缓存 5 秒
        proxy_cache_valid 404 5s;
        # 仅在源站返回 Cache-Control 头时缓存
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        # 添加缓存状态头，便于调试
        add_header X-Cache-Status $upstream_cache_status;
        # 需要读取 request body 用于缓存 key
        proxy_request_buffering on;
    }

    # Banner 图片 — 较长的代理缓存
    location /api/getBanner {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache api_cache;
        proxy_cache_valid 200 300s;
        proxy_cache_valid 404 60s;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 其他所有请求
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
